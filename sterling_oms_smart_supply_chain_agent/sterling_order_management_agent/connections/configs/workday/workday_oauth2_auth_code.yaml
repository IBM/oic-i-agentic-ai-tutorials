spec_version: v1
kind: connection
app_id: workday_oauth2_auth_code
environments:
    draft:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{WORKDAY[base_url]}"
        credentials:
            token_url: "{WORKDAY[token_url]}"
            authorization_url: "{WORKDAY[auth_url]}"
            client_id: "{WORKDAY[client_id]}"
            client_secret: "{WORKDAY[client_secret]}"
    live:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{WORKDAY[base_url]}"
        credentials:
            token_url: "{WORKDAY[token_url]}"
            authorization_url: "{WORKDAY[auth_url]}"
            client_id: "{WORKDAY[client_id]}"
            client_secret: "{WORKDAY[client_secret]}"
