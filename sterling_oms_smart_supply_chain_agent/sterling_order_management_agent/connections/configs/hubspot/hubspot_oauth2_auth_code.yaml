spec_version: v1
kind: connection
app_id: hubspot_oauth2_auth_code
environments:
    draft:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{HUBSPOT[base_url]}"
        credentials:
            token_url: "{HUBSPOT[token_url]}"
            authorization_url: "{HUBSPOT[auth_url]}"
            client_id: "{HUBSPOT[client_id]}"
            client_secret: "{HUBSPOT[client_secret]}"
            scope: "{HUBSPOT[scope]}"
    live:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{HUBSPOT[base_url]}"
        credentials:
            token_url: "{HUBSPOT[token_url]}"
            authorization_url: "{HUBSPOT[auth_url]}"
            client_id: "{HUBSPOT[client_id]}"
            client_secret: "{HUBSPOT[client_secret]}"
            scope: "{HUBSPOT[scope]}"
