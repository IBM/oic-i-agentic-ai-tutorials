spec_version: v1
kind: connection
app_id: microsoft_oauth2_auth_code
environments:
    draft:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{MICROSOFT[base_url]}"
        credentials:
            token_url: "{MICROSOFT[token_url]}"
            authorization_url: "{MICROSOFT[auth_url]}"
            client_id: "{MICROSOFT[client_id]}"
            client_secret: "{MICROSOFT[client_secret]}"
            scope: "{MICROSOFT[scope]}"
    live:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{MICROSOFT[base_url]}"
        credentials:
            token_url: "{MICROSOFT[token_url]}"
            authorization_url: "{MICROSOFT[auth_url]}"
            client_id: "{MICROSOFT[client_id]}"
            client_secret: "{MICROSOFT[client_secret]}"
            scope: "{MICROSOFT[scope]}"
