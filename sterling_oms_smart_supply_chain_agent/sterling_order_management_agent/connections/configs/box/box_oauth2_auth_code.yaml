spec_version: v1
kind: connection
app_id: box_oauth2_auth_code
environments:
    draft:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{BOX[base_url]}"
        credentials:
            token_url: "{BOX[token_url]}"
            authorization_url: "{BOX[auth_url]}"
            client_id: "{BOX[client_id]}"
            client_secret: "{BOX[client_secret]}"
    live:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{BOX[base_url]}"
        credentials:
            token_url: "{BOX[token_url]}"
            authorization_url: "{BOX[auth_url]}"
            client_id: "{BOX[client_id]}"
            client_secret: "{BOX[client_secret]}"
