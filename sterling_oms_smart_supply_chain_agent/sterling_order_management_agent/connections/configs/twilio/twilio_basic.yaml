spec_version: v1
kind: connection
app_id: twilio_basic
environments:
    draft:
        kind: basic
        type: team
        sso: false
        server_url: "{TWILIO[base_url]}"
        credentials:
            username: "{TWILIO[username]}"
            password: "{TWILIO[password]}"
    live:
        kind: basic
        type: team
        sso: false
        server_url: "{TWILIO[base_url]}"
        credentials:
            username: "{TWILIO[username]}"
            password: "{TWILIO[password]}"
