spec_version: v1
kind: connection
app_id: coupa_oauth2_auth_code
environments:
    draft:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{COUPA[base_url]}"
        credentials:
            token_url: "{COUPA[token_url]}"
            authorization_url: "{COUPA[auth_url]}"
            client_id: "{COUPA[client_id]}"
            client_secret: "{COUPA[client_secret]}"
            scope: "{COUPA[scope]}"
    live:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{COUPA[base_url]}"
        credentials:
            token_url: "{COUPA[token_url]}"
            authorization_url: "{COUPA[auth_url]}"
            client_id: "{COUPA[client_id]}"
            client_secret: "{COUPA[client_secret]}"
            scope: "{COUPA[scope]}"
