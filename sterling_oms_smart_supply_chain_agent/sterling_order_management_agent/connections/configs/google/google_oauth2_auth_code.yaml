spec_version: v1
kind: connection
app_id: google_oauth2_auth_code
environments:
    draft:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{GOOGLE[base_url]}"
        credentials:
            token_url: "{GOOGLE[token_url]}"
            authorization_url: "{GOOGLE[auth_url]}"
            client_id: "{GOOGLE[client_id]}"
            client_secret: "{GOOGLE[client_secret]}"
            scope: "{GOOGLE[scope]}"
    live:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{GOOGLE[base_url]}"
        credentials:
            token_url: "{GOOGLE[token_url]}"
            authorization_url: "{GOOGLE[auth_url]}"
            client_id: "{GOOGLE[client_id]}"
            client_secret: "{GOOGLE[client_secret]}"
            scope: "{GOOGLE[scope]}"
