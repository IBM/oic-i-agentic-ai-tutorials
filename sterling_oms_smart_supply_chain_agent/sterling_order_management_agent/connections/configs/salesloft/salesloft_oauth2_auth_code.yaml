spec_version: v1
kind: connection
app_id: salesloft_oauth2_auth_code
environments:
    draft:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{SALESLOFT[base_url]}"
        credentials:
            token_url: "{SALESLOFT[token_url]}"
            authorization_url: "{SALESLOFT[auth_url]}"
            client_id: "{SALESLOFT[client_id]}"
            client_secret: "{SALESLOFT[client_secret]}"
            scope": "{SALESLOFT[scope]}"
    live:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{SALESLOFT[base_url]}"
        credentials:
            token_url: "{SALESLOFT[token_url]}"
            authorization_url: "{SALESLOFT[auth_url]}"
            client_id: "{SALESLOFT[client_id]}"
            client_secret: "{SALESLOFT[client_secret]}"
            scope": "{SALESLOFT[scope]}"