spec_version: v1
kind: connection
app_id: slack_oauth2_auth_code
environments:
    draft:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{SLACK[base_url]}"
        credentials:
            token_url: "{SLACK[token_url]}"
            authorization_url: "{SLACK[auth_url]}"
            client_id: "{SLACK[client_id]}"
            client_secret: "{SLACK[client_secret]}"
    live:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{SLACK[base_url]}"
        credentials:
            token_url: "{SLACK[token_url]}"
            authorization_url: "{SLACK[auth_url]}"
            client_id: "{SLACK[client_id]}"
            client_secret: "{SLACK[client_secret]}"
