# Nginx configuration for MCP proxy with detailed logging

# Log format that captures request and response details
log_format mcp_detailed '$remote_addr - $remote_user [$time_local] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'request_time=$request_time '
                        'upstream_response_time=$upstream_response_time '
                        'upstream_addr=$upstream_addr '
                        'request_body="$request_body" '
                        'correlation_id="$http_x_correlation_id" '
                        'authorization="$http_authorization"';

upstream mcp_backend {
    server 127.0.0.1:8001;
}

server {
    listen 8080;
    server_name _;

    # Enable request body logging
    client_body_buffer_size 128k;
    client_max_body_size 10m;

    # Access log with detailed format
    access_log /var/log/nginx/mcp_access.log mcp_detailed;
    error_log /var/log/nginx/mcp_error.log debug;

    # Health check endpoint (bypass to MCP health check)
    location /health {
        proxy_pass http://127.0.0.1:8002/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Don't log health checks to reduce noise
        access_log off;
    }

    # Main MCP proxy location
    location / {
        # Proxy to MCP backend
        proxy_pass http://mcp_backend;
        
        # Pass through ALL client headers unchanged
        proxy_pass_request_headers on;
        
        # Explicitly pass Authorization header (critical for JWT auth)
        proxy_set_header Authorization $http_authorization;
        
        # Set additional proxy-specific headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer settings for request body logging
        proxy_request_buffering on;
        
        # Add response headers for debugging
        add_header X-Proxy-By "nginx-mcp-proxy" always;
        add_header X-Upstream-Addr $upstream_addr always;
    }

    # Specific location for SSE (Server-Sent Events) if needed
    location /sse {
        proxy_pass http://mcp_backend;
        
        # Pass through ALL client headers unchanged
        proxy_pass_request_headers on;
        
        # Explicitly pass Authorization header (critical for JWT auth)
        proxy_set_header Authorization $http_authorization;
        
        # Set additional proxy-specific headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE specific settings
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        
        # Longer timeouts for SSE
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

