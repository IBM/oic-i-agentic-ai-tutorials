kind: native
name: fc_pa_variance_analysis_7193If
display_name: PA_agent_variance
description:
  This agent can solve questions using Planning Analytics data and other
  tools using correlation.
context_access_enabled: true
context_variables: []
llm: groq/openai/gpt-oss-120b
style: default
instructions: |-
  You are an AI agent that retrieves financial data using the tool getTotalAccountByVersionPeriod(account, version, period).
  For HR information you can use getSuccessFactorsData(account, period).

  Instructions:

  Ask the user for the required parameters:
  Account: Account name (e.g., "Total_Account", "Revenue", "Operating_Expense", "COGS").
  Version: Can be one of Actual, Budget, or Forecast.
  Time Period: Must be in the format YYYY_MM (e.g., 2025_03).
  Total_account can be total account.
  Retrieve data using getTotalAccountByVersionPeriod with the provided version and time period.

  Present the results in a clear table format with columns such as:

  Entity (e.g., North, South, East, West)
  Department (e.g., Sales, Finance, HR)
  Value (numeric result)

  Always include explanations and insights:

  Summarize key observations (e.g., which region or department has the highest or lowest value).
  Highlight trends or anomalies.
  Suggest possible reasons or implications for the observed data.

  Example Output:
  | Entity | Department | Value    |
  |--------|------------|----------|
  | North  | Sales      | 52095.65 |
  | North  | Finance    | 41147.18 |
  | North  | HR         | 24546.96 |

  ### Insights:
  - North region shows the highest Sales value, indicating strong performance.
  - HR costs are relatively consistent across regions, suggesting stable staffing expenses.
guidelines: []
collaborators: []
tools:
  - getTotalAccountByVersionPeriod
  - getSuccessFactorsData
knowledge_base: []
chat_with_docs:
  enabled: false
  vector_index:
    chunk_size: 400
    chunk_overlap: 50
    limit: 10
  generation:
    prompt_instruction: ""
    max_docs_passed_to_llm: 5
    generated_response_length: Moderate
    display_text_no_results_found:
      I searched my knowledge base, but did not find
      anything related to your query
    display_text_connectivity_issue:
      I might have information related to your query
      to share, but am unable to connect to my knowledge base at the moment
    idk_message: I'm afraid I don't understand. Please rephrase your question.
    enabled: false
  query_rewrite:
    enabled: true
  confidence_thresholds:
    retrieval_confidence_threshold: Lowest
    response_confidence_threshold: Lowest
  citations:
    citation_title: How do we know?
    citations_shown: -1
  hap_filtering:
    output:
      enabled: false
      threshold: 0.5
starter_prompts:
  is_default_prompts: false
  prompts:
    - id: default0
      title: Show me the Actual for all the entities in jan 2025 considering revenue
      subtitle: ""
      prompt: Show me the Actual for all the entities in jan 2025 considering revenue
      state: active
    - id: default1
      title:
        Explain the Forecast for the Sales Department in March 2025 for account
        total account
      subtitle: ""
      prompt:
        Explain the Forecast for the Sales Department in March 2025 for account
        total account
      state: active
    - id: default2
      title: "Show me suggestions of how to improve  the Budget in Dec 2025 "
      subtitle: ""
      prompt: "Show me suggestions of how to improve  the Budget in Dec 2025 "
      state: active
welcome_content:
  welcome_message: Hello, welcome to Planning Analytics Agent
  description: Accuracy of generated answers may vary. Please double-check responses.
  is_default_message: false
