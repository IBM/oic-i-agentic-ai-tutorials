spec_version: v1
kind: connection
app_id: gitlab_oauth2_auth_code
environments:
    draft:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{GITLAB[base_url]}"
        credentials:
            token_url: "{GITLAB[token_url]}"
            authorization_url: "{GITLAB[auth_url]}"
            client_id: "{GITLAB[client_id]}"
            client_secret: "{GITLAB[client_secret]}"
    live:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{GITLAB[base_url]}"
        credentials:
            token_url: "{GITLAB[token_url]}"
            authorization_url: "{GITLAB[auth_url]}"
            client_id: "{GITLAB[client_id]}"
            client_secret: "{GITLAB[client_secret]}"