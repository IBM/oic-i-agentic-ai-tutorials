spec_version: v1
kind: connection
app_id: servicenow_oauth2_auth_code
environments:
    draft:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{SERVICENOW[base_url]}"
        credentials:
            token_url: "{SERVICENOW[token_url]}"
            authorization_url: "{SERVICENOW[auth_url]}"
            client_id: "{SERVICENOW[client_id]}"
            client_secret: "{SERVICENOW[client_secret]}"
            scope: "{SERVICENOW[scope]}"
    live:
        kind: oauth_auth_code_flow
        type: member
        sso: false
        server_url: "{SERVICENOW[base_url]}"
        credentials:
            token_url: "{SERVICENOW[token_url]}"
            authorization_url: "{SERVICENOW[auth_url]}"
            client_id: "{SERVICENOW[client_id]}"
            client_secret: "{SERVICENOW[client_secret]}"
            scope: "{SERVICENOW[scope]}"
